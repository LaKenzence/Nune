<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ff4fb3">

<title>23 Signals</title>

<link rel="manifest" href="manifest.json">

<style>
body {
    margin: 0;
    font-family: -apple-system, Arial;
    background: linear-gradient(135deg, #ff9ad5, #7aa7ff);
    color: white;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    overflow: hidden;
}

.card {
    width: 85%;
    max-width: 340px;
    padding: 22px;
    background: rgba(255,255,255,0.18);
    border-radius: 20px;
    backdrop-filter: blur(12px);
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
}

button {
    margin-top: 15px;
    padding: 12px 18px;
    border: none;
    border-radius: 12px;
    background: white;
    color: #ff4fb3;
    font-weight: bold;
}

small { opacity: 0.8; margin-top: 10px; }

input {
    margin-top: 15px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    width: 70%;
}

</style>
</head>

<body>

<h2>✨ Twenty Three</h2>

<div class="card" id="box">
Tap to start signals for Nune 💖
</div>

<input id="input" placeholder="say something..." />

<button onclick="send()">SEND</button>

<button onclick="tap()">NEXT SIGNAL</button>

<button onclick="toggleMusic()">🎵 music</button>

<small id="meta"></small>

<audio id="music" loop>
    <source src="lo-fi.mp3" type="audio/mp3">
</audio>

<script>
let count = 0;
let mood = "";

const box = document.getElementById("box");
const meta = document.getElementById("meta");
const input = document.getElementById("input");

/* PWA register */
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
}

/* vibration (mobile feel) */
function vibrate() {
    if (navigator.vibrate) navigator.vibrate(30);
}

/* typing effect */
function typeText(text, element) {
    element.innerHTML = "";
    let i = 0;

    const interval = setInterval(() => {
        element.innerHTML += text[i];
        i++;
        if (i >= text.length) clearInterval(interval);
    }, 25);
}

/* TIME MESSAGE */
function getTimeMessage() {
    const h = new Date().getHours();

    if (h < 12) return "Good morning Nune ☀️";
    if (h < 18) return "Good afternoon Nune 🌤️";
    return "Good evening Nune 🌙";
}

/* conversation system amélioré */
function send() {
    const val = input.value.toLowerCase();
    vibrate();

    if (val.includes("hello")) mood = "Hey Nune 💖";
    else if (val.includes("23")) mood = "You keep noticing it… interesting ✨";
    else if (val.includes("who")) mood = "Just a soft signal system built for you";
    else if (val.includes("love")) mood = "That word carries a strong signal 💫";
    else mood = "I’m listening to your signal…";

    typeText(mood, box);
}

/* main tap */
function tap() {
    count++;
    vibrate();

    let msgList = [
        "A small signal reached Nune ✨",
        "Something is softly aligning today",
        "You are inside a gentle coincidence",
        "The number 23 is quietly present",
        "Nothing here is random",
        "A future moment is already forming",
        "You are doing better than you think 💖"
    ];

    let msg = msgList[Math.floor(Math.random()*msgList.length)];

    if (count === 5) msg = getTimeMessage();
    if (count === 12) msg = "Chapter 2: the system starts recognizing you…";
    if (count === 20) msg = "Final approach… 23 is close ✨";

    typeText(msg, box);
    meta.innerText = "signal " + count;

    if (count === 23) {
        setTimeout(() => {
            document.body.innerHTML = `
                <div style="
                    height:100vh;
                    display:flex;
                    flex-direction:column;
                    justify-content:center;
                    align-items:center;
                    text-align:center;
                    padding:25px;
                    background: linear-gradient(135deg,#ff4fb3,#6a7cff);
                    color:white;
                ">
                    <h2>💌 PRIVATE SIGNAL UNLOCKED</h2>
                    <p style="max-width:300px; font-size:18px;">
                        Nune…<br><br>
                        this wasn’t just 23 taps.<br><br>
                        it was someone paying attention.
                    </p>
                    <p style="opacity:0.8;">end of signal sequence ✨</p>
                </div>
            `;
        }, 500);
    }
}

/* music fix mobile */
function toggleMusic() {
    const m = document.getElementById("music");
    m.volume = 0.4;

    if (m.paused) {
        m.play().catch(()=>{});
        box.innerHTML = "Music started 🎵";
    } else {
        m.pause();
        box.innerHTML = "Music paused";
    }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>23 Signals</title>

<link rel="manifest" href="manifest.json">

<style>
body {
    margin: 0;
    font-family: -apple-system, Arial;
    background: linear-gradient(135deg, #ff9ad5, #7aa7ff);
    color: white;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    overflow: hidden;
}

.card {
    width: 85%;
    max-width: 340px;
    padding: 22px;
    background: rgba(255,255,255,0.18);
    border-radius: 20px;
    backdrop-filter: blur(12px);
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
}

button {
    margin-top: 15px;
    padding: 12px 18px;
    border: none;
    border-radius: 12px;
    background: white;
    color: #ff4fb3;
    font-weight: bold;
}

small { opacity: 0.8; margin-top: 10px; }

input {
    margin-top: 15px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    width: 70%;
}

</style>
</head>

<body>

<h2>✨ Twenty Three</h2>

<div class="card" id="box">
Tap to start signals for Nune 💖
</div>

<input id="input" placeholder="say something..." />

<button onclick="send()">SEND</button>

<button onclick="tap()">NEXT SIGNAL</button>

<button onclick="toggleMusic()">🎵 music</button>

<small id="meta"></small>

<audio id="music" loop>
    <source src="lo-fi.mp3" type="audio/mp3">
</audio>

<script>
let count = 0;
let mood = "";

const box = document.getElementById("box");
const meta = document.getElementById("meta");

/* PWA register */
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
}

/* TIME BASED MESSAGE */
function getTimeMessage() {
    const h = new Date().getHours();

    if (h < 12) return "Good morning Nune ☀️";
    if (h < 18) return "Good afternoon Nune 🌤️";
    return "Good evening Nune 🌙";
}

/* conversation system */
function send() {
    const val = document.getElementById("input").value.toLowerCase();

    if (val.includes("hello")) mood = "hello back 💖";
    else if (val.includes("23")) mood = "you noticed it too…";
    else if (val.includes("who")) mood = "just a small signal system ✨";
    else mood = "I’m listening…";

    box.innerHTML = mood;
}

/* main tap */
function tap() {
    count++;

    let msgList = [
        "A signal just found its way to you ✨",
        "Something feels aligned today for Nune",
        "You are currently inside a soft coincidence",
        "The number 23 is watching quietly",
        "This is not random at all",
        "A future version of this moment exists already",
        "You are doing better than you think 💖"
    ];

    let msg = msgList[Math.floor(Math.random()*msgList.length)];

    if (count === 5) msg = getTimeMessage();
    if (count === 12) msg = "Chapter 2: something is building between signals 💭";
    if (count === 20) msg = "Final approach… 23 is near ✨";

    box.innerHTML = msg;
    meta.innerText = "signal " + count;

    if (count === 23) {
        box.innerHTML = `
            💌 PRIVATE MESSAGE UNLOCKED<br><br>
            Nune…<br>
            you didn’t just click 23 times.<br><br>
            you stayed long enough to notice.
        `;
    }
}

/* music */
function toggleMusic() {
    const m = document.getElementById("music");
    if (m.paused) m.play();
    else m.pause();
}
</script>

</body>
</html>
